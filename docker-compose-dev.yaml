services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8888:8080"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/public/build
      - ./backend/storage/db:/var/www/html/storage/db
    env_file:
      - ./backend/.env.development
    environment:
      - APP_ENV=development
    
    
